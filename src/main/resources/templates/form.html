<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Rapor Oluştur ve Dosya Yükle</h2>
<form th:action="@{/}" th:object="${report}" method="post" enctype="multipart/form-data">
    <table>
        <tr>
            <td>İsim:</td>
            <td><input type="text" th:field="*{name}" /></td>
            <td th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Hata</td>
        </tr>
        <tr>
            <td>ID:</td>
            <td><input type="text" th:field="*{id}" /></td>
            <td th:if="${#fields.hasErrors('id')}" th:errors="*{id}">Hata</td>
        </tr>
        <tr>
            <td>Dosya:</td>
            <td><input type="file" name="file" /></td>
        </tr>
        <tr>
            <td><button type="submit">Gönder</button></td>
        </tr>
    </table>
</form>
</body>
</html>
